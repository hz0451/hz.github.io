<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Diary | 你的私人日记</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fafafa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 36px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .login-card h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: #666;
            margin-bottom: 32px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e0e0e0;
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 18px;
            outline: none;
        }

        .login-input:focus {
            border-color: #1a1a2e;
            box-shadow: 0 0 0 3px rgba(26,26,46,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .error-msg {
            color: #ed4956;
            font-size: 0.85rem;
            margin-top: 12px;
        }

        .main-content {
            max-width: 680px;
            margin: 0 auto;
            display: none;
        }

        .navbar {
            background: white;
            border-radius: 24px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .settings-btn, .cloud-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
        }

        .date-section {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .date-info {
            font-weight: 600;
            font-size: 1.2rem;
            color: #1a1a2e;
        }

        .date-weekday {
            font-size: 0.85rem;
            color: #8e8e8e;
            margin-left: 10px;
            font-weight: 400;
        }

        .edit-date-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            background: #f5f5f5;
        }

        .new-status-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .new-status-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 20px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            outline: none;
        }

        .new-status-input:focus {
            border-color: #1a1a2e;
        }

        .new-status-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 12px;
        }

        .post-status-btn {
            padding: 10px 24px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .status-card {
            background: white;
            border-radius: 24px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .status-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #efefef;
        }

        .status-time {
            font-size: 0.8rem;
            color: #8e8e8e;
            font-weight: 500;
        }

        .delete-status-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #8e8e8e;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .status-content {
            padding: 20px;
            font-size: 1rem;
            line-height: 1.6;
            color: #262626;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status-stats {
            padding: 12px 20px;
            border-top: 1px solid #efefef;
            border-bottom: 1px solid #efefef;
            display: flex;
            gap: 24px;
        }

        .stat-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #8e8e8e;
            cursor: pointer;
            padding: 6px 0;
        }

        .stat-btn.liked {
            color: #ed4956;
        }

        .comments-section {
            padding: 16px 20px;
            background: #fafafa;
        }

        .comment-item {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            font-size: 0.85rem;
        }

        .comment-name {
            font-weight: 600;
            color: #262626;
            min-width: 55px;
        }

        .comment-text {
            color: #262626;
            flex: 1;
            word-break: break-word;
        }

        .comment-time {
            font-size: 0.7rem;
            color: #8e8e8e;
        }

        .add-comment {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }

        .add-comment input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 30px;
            outline: none;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .add-comment button {
            background: none;
            border: none;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-status {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e8e;
            background: white;
            border-radius: 24px;
        }

        .cloud-modal, .settings-modal, .date-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1002;
            align-items: center;
            justify-content: center;
        }

        .cloud-card, .settings-card, .date-modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 380px;
        }

        .cloud-card h3, .settings-card h3, .date-modal-content h4 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .cloud-card input, .settings-card input, .date-modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            margin-bottom: 15px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .cloud-card button, .settings-card button, .date-modal-content button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #1a1a2e;
            color: white;
        }

        .btn-danger {
            background: #ed4956;
            color: white;
        }

        .btn-secondary {
            background: #efefef;
            color: #262626;
        }

        .status-msg {
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            margin: 10px 18px;
            font-size: 0.8rem;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .logout-btn {
            width: calc(100% - 36px);
            margin: 0 18px 20px;
            padding: 10px;
            background: none;
            border: 1px solid #dbdbdb;
            border-radius: 30px;
            color: #8e8e8e;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <h2>📔 Diary</h2>
        <p>输入密码进入你的私人空间</p>
        <input type="password" class="login-input" id="loginPassword" placeholder="请输入密码" onkeypress="if(event.key==='Enter') checkLogin()">
        <button class="login-btn" onclick="checkLogin()">进入</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="navbar">
        <div class="logo">📔 Diary</div>
        <div class="nav-buttons">
            <button class="cloud-btn" onclick="openCloudModal()">☁️</button>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
    </div>

    <div class="date-section">
        <div>
            <span class="date-info" id="displayDate"></span>
            <span class="date-weekday" id="displayWeekday"></span>
        </div>
        <button class="edit-date-btn" onclick="openDateModal()">📅</button>
    </div>

    <div class="new-status-card">
        <textarea class="new-status-input" id="newStatusInput" rows="3" placeholder="写点什么..."></textarea>
        <div class="new-status-actions">
            <button class="post-status-btn" onclick="addStatus()">发布</button>
        </div>
    </div>

    <div id="statusList"></div>

    <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
    <div id="statusMsg" style="display: none;"></div>
</div>

<div class="date-modal" id="dateModal">
    <div class="date-modal-content">
        <h4>选择日期</h4>
        <input type="date" id="datePicker">
        <button class="btn-primary" onclick="changeDate()">切换</button>
        <button class="btn-secondary" onclick="closeDateModal()">取消</button>
    </div>
</div>

<div class="cloud-modal" id="cloudModal">
    <div class="cloud-card">
        <h3>☁️ 坚果云同步</h3>
        <input type="text" id="webdavUrl" placeholder="服务器地址" value="https://dav.jianguoyun.com/dav/">
        <input type="text" id="webdavUser" placeholder="坚果云账号">
        <input type="password" id="webdavPass" placeholder="应用密码">
        <button class="btn-primary" onclick="testAndSaveCloud()">测试并保存</button>
        <button class="btn-secondary" onclick="syncFromCloud()">手动同步</button>
        <button class="btn-secondary" onclick="closeCloudModal()">关闭</button>
        <div id="cloudStatus" style="font-size:0.75rem; margin-top:10px;"></div>
    </div>
</div>

<div class="settings-modal" id="settingsModal">
    <div class="settings-card">
        <h3>⚙️ 密码设置</h3>
        <input type="password" id="newPassword" placeholder="新密码">
        <input type="password" id="confirmPassword" placeholder="确认密码">
        <button class="btn-primary" onclick="changePassword()">修改密码</button>
        <button class="btn-danger" onclick="disablePassword()">取消密码</button>
        <button class="btn-secondary" onclick="closeSettings()">关闭</button>
    </div>
</div>

<script>
    // 存储KEY
    const STORAGE_KEY = 'diary_all_data';
    const PASSWORD_KEY = 'diary_password';
    const CLOUD_CONFIG_KEY = 'diary_cloud_config';
    const DEFAULT_PASSWORD = '123456';

    let currentDate = new Date().toISOString().split('T')[0];
    let allData = {};
    let isSyncing = false;

    // WebDAV配置
    function getCloudConfig() {
        const saved = localStorage.getItem(CLOUD_CONFIG_KEY);
        return saved ? JSON.parse(saved) : null;
    }

    async function webdavRequest(method, path, content = null) {
        const config = getCloudConfig();
        if (!config || !config.user || !config.pass) throw new Error('未配置坚果云');
        const fullUrl = `${config.url.replace(/\/$/, '')}${path}`;
        const options = {
            method: method,
            headers: {
                'Authorization': 'Basic ' + btoa(`${config.user}:${config.pass}`)
            }
        };
        if (content !== null) {
            options.headers['Content-Type'] = 'application/json';
            options.body = content;
        }
        const response = await fetch(fullUrl, options);
        return response;
    }

    async function uploadToCloud() {
        const config = getCloudConfig();
        if (!config) return false;
        try {
            await webdavRequest('PUT', '/diary_data.json', JSON.stringify(allData));
            showStatus('☁️ 已同步到云端', 'success');
            return true;
        } catch(e) { return false; }
    }

    async function downloadFromCloud() {
        const config = getCloudConfig();
        if (!config) return false;
        try {
            const response = await webdavRequest('GET', '/diary_data.json');
            if (response.status === 200) {
                allData = await response.json();
                saveAllData();
                showStatus('☁️ 同步成功', 'success');
                return true;
            }
        } catch(e) { return false; }
        return false;
    }

    async function syncFromCloud() {
        if (isSyncing) return;
        isSyncing = true;
        showStatus('🔄 同步中...', 'info');
        await downloadFromCloud();
        renderStatusList();
        isSyncing = false;
    }

    async function testAndSaveCloud() {
        const url = document.getElementById('webdavUrl').value;
        const user = document.getElementById('webdavUser').value;
        const pass = document.getElementById('webdavPass').value;
        if (!url || !user || !pass) {
            document.getElementById('cloudStatus').innerHTML = '❌ 请填写完整';
            return;
        }
        document.getElementById('cloudStatus').innerHTML = '🔄 测试中...';
        const testConfig = { url, user, pass };
        try {
            const response = await fetch(`${url.replace(/\/$/, '')}/`, {
                method: 'PROPFIND',
                headers: { 'Authorization': 'Basic ' + btoa(`${user}:${pass}`) }
            });
            if (response.status === 200 || response.status === 207) {
                localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify(testConfig));
                document.getElementById('cloudStatus').innerHTML = '✅ 配置成功！';
                showStatus('☁️ 配置成功，正在同步...', 'success');
                await syncFromCloud();
            } else {
                document.getElementById('cloudStatus').innerHTML = '❌ 认证失败';
            }
        } catch(e) {
            document.getElementById('cloudStatus').innerHTML = `❌ 失败: ${e.message}`;
        }
    }

    // 数据管理
    function loadAllData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        allData = stored ? JSON.parse(stored) : {};
    }

    function saveAllData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
        setTimeout(() => uploadToCloud(), 300);
    }

    function getDayData() {
        if (!allData[currentDate]) {
            allData[currentDate] = { statuses: [] };
        }
        return allData[currentDate];
    }

    function saveDayData(data) {
        allData[currentDate] = data;
        saveAllData();
    }

    // 状态操作
    function addStatus() {
        const input = document.getElementById('newStatusInput');
        const content = input.value.trim();
        if (!content) return;
        
        const dayData = getDayData();
        const newStatus = {
            id: Date.now(),
            content: content,
            time: new Date().toLocaleString(),
            likes: 0,
            liked: false,
            comments: []
        };
        dayData.statuses.unshift(newStatus);
        saveDayData(dayData);
        input.value = '';
        renderStatusList();
        showStatus('✅ 已发布', 'success');
    }

    function deleteStatus(statusId) {
        if (!confirm('确定删除这条状态吗？')) return;
        const dayData = getDayData();
        dayData.statuses = dayData.statuses.filter(s => s.id !== statusId);
        saveDayData(dayData);
        renderStatusList();
        showStatus('🗑️ 已删除', 'success');
    }

    function toggleLike(statusId) {
        const dayData = getDayData();
        const status = dayData.statuses.find(s => s.id === statusId);
        if (status) {
            if (status.liked) {
                status.likes--;
                status.liked = false;
            } else {
                status.likes++;
                status.liked = true;
            }
            saveDayData(dayData);
            renderStatusList();
        }
    }

    function addComment(statusId) {
        const input = document.getElementById(`comment_input_${statusId}`);
        const text = input.value.trim();
        if (!text) return;
        
        const dayData = getDayData();
        const status = dayData.statuses.find(s => s.id === statusId);
        if (status) {
            status.comments.push({
                text: text,
                time: new Date().toLocaleString()
            });
            saveDayData(dayData);
            input.value = '';
            renderStatusList();
            showStatus('💬 评论已发布', 'success');
        }
    }

    function deleteComment(statusId, commentIdx) {
        const dayData = getDayData();
        const status = dayData.statuses.find(s => s.id === statusId);
        if (status) {
            status.comments.splice(commentIdx, 1);
            saveDayData(dayData);
            renderStatusList();
        }
    }

    // 渲染
    function renderStatusList() {
        const dayData = getDayData();
        const statuses = dayData.statuses || [];
        const container = document.getElementById('statusList');
        
        if (statuses.length === 0) {
            container.innerHTML = '<div class="empty-status">✨ 还没有状态，写点什么吧～</div>';
            return;
        }
        
        container.innerHTML = statuses.map(status => `
            <div class="status-card">
                <div class="status-header">
                    <span class="status-time">📝 ${status.time}</span>
                    <button class="delete-status-btn" onclick="deleteStatus(${status.id})">🗑️</button>
                </div>
                <div class="status-content">${escapeHtml(status.content)}</div>
                <div class="status-stats">
                    <button class="stat-btn ${status.liked ? 'liked' : ''}" onclick="toggleLike(${status.id})">
                        <span>❤️</span> <span>${status.likes || 0}</span>
                    </button>
                    <button class="stat-btn" onclick="document.getElementById('comments_${status.id}').scrollIntoView({behavior:'smooth'})">
                        <span>💬</span> <span>${status.comments.length}</span>
                    </button>
                </div>
                <div class="comments-section" id="comments_${status.id}">
                    ${renderComments(status.comments, status.id)}
                    <div class="add-comment">
                        <input type="text" id="comment_input_${status.id}" placeholder="写评论..." onkeypress="if(event.key==='Enter') addComment(${status.id})">
                        <button onclick="addComment(${status.id})">发送</button>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function renderComments(comments, statusId) {
        if (!comments || comments.length === 0) {
            return '<div style="color:#8e8e8e; font-size:0.75rem; margin-bottom:10px;">还没有评论</div>';
        }
        return comments.map((comment, idx) => `
            <div class="comment-item">
                <span class="comment-name">📝 你</span>
                <div style="flex:1">
                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                    <div class="comment-time">${comment.time}</div>
                </div>
                <button onclick="deleteComment(${statusId}, ${idx})" style="background:none; border:none; color:#8e8e8e; cursor:pointer;">🗑️</button>
            </div>
        `).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateDateDisplay() {
        const dateObj = new Date(currentDate);
        const year = dateObj.getFullYear();
        const month = dateObj.getMonth() + 1;
        const day = dateObj.getDate();
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        document.getElementById('displayDate').innerText = `${year}年${month}月${day}日`;
        document.getElementById('displayWeekday').innerText = weekdays[dateObj.getDay()];
    }

    function changeDate() {
        const newDate = document.getElementById('datePicker').value;
        if (newDate) {
            currentDate = newDate;
            updateDateDisplay();
            renderStatusList();
        }
        closeDateModal();
    }

    function openDateModal() {
        document.getElementById('datePicker').value = currentDate;
        document.getElementById('dateModal').style.display = 'flex';
    }

    function closeDateModal() { document.getElementById('dateModal').style.display = 'none'; }
    function openCloudModal() { document.getElementById('cloudModal').style.display = 'flex'; }
    function closeCloudModal() { document.getElementById('cloudModal').style.display = 'none'; }
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

    function showStatus(msg, type) {
        const div = document.getElementById('statusMsg');
        div.textContent = msg;
        div.className = `status-msg status-${type}`;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 2500);
    }

    // 密码系统
    function getStoredPassword() {
        const pwd = localStorage.getItem(PASSWORD_KEY);
        return pwd === null ? DEFAULT_PASSWORD : pwd;
    }

    function checkLogin() {
        const inputPwd = document.getElementById('loginPassword').value;
        const storedPwd = getStoredPassword();
        if (storedPwd === '' || inputPwd === storedPwd) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadAllData();
            updateDateDisplay();
            renderStatusList();
            setTimeout(() => { if(getCloudConfig()) syncFromCloud(); }, 500);
        } else {
            document.getElementById('loginError').innerText = '密码错误';
        }
    }

    function logout() {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').innerText = '';
    }

    function changePassword() {
        const newPwd = document.getElementById('newPassword').value;
        const confirmPwd = document.getElementById('confirmPassword').value;
        if (!newPwd || newPwd !== confirmPwd || newPwd.length < 4) {
            showStatus('密码至少4位且两次输入一致', 'error');
            return;
        }
        localStorage.setItem(PASSWORD_KEY, newPwd);
        closeSettings();
        showStatus('密码修改成功', 'success');
        setTimeout(() => { if(confirm('是否立即退出用新密码登录？')) logout(); }, 1000);
    }

    function disablePassword() {
        if (confirm('确定取消密码保护？')) {
            localStorage.setItem(PASSWORD_KEY, '');
            closeSettings();
            showStatus('密码已取消', 'success');
            setTimeout(() => logout(), 1000);
        }
    }

    function checkAutoLogin() {
        if (getStoredPassword() === '') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadAllData();
            updateDateDisplay();
            renderStatusList();
            setTimeout(() => { if(getCloudConfig()) syncFromCloud(); }, 500);
        }
    }

    document.getElementById('dateModal').addEventListener('click', e => { if(e.target === document.getElementById('dateModal')) closeDateModal(); });
    document.getElementById('cloudModal').addEventListener('click', e => { if(e.target === document.getElementById('cloudModal')) closeCloudModal(); });
    document.getElementById('settingsModal').addEventListener('click', e => { if(e.target === document.getElementById('settingsModal')) closeSettings(); });

    checkAutoLogin();
</script>
</body>
</html>
