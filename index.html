<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Agit | 你的私人日记</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F5F2EB; font-family: 'Inter', sans-serif; padding: 20px; min-height: 100vh; }
        :root { --bg: #F5F2EB; --card-bg: #FFFFFF; --primary: #9A8C7D; --primary-dark: #7F6E5D; --secondary: #C5C0B3; --text: #4A4A4A; --text-light: #8A8A8A; --border: #E8E4DC; --like: #D4A5A5; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(90,80,70,0.92); backdrop-filter: blur(12px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); border-radius: 32px; padding: 48px 36px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .login-card h2 { font-size: 2.2rem; font-weight: 700; margin-bottom: 12px; color: var(--primary); }
        .login-card p { color: var(--text-light); margin-bottom: 32px; }
        .login-input { width: 100%; padding: 14px 18px; border: 1.5px solid var(--border); border-radius: 16px; font-size: 1rem; margin-bottom: 18px; outline: none; }
        .login-input:focus { border-color: var(--primary); }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .error-msg { color: var(--like); font-size: 0.85rem; margin-top: 12px; }
        .main-content { max-width: 680px; margin: 0 auto; display: none; }
        .navbar { background: var(--card-bg); border-radius: 24px; padding: 16px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .logo { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .nav-buttons { display: flex; gap: 12px; }
        .settings-btn, .sync-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 8px; border-radius: 12px; }
        .date-section { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .date-info { font-weight: 600; font-size: 1.2rem; color: var(--text); }
        .date-weekday { font-size: 0.85rem; color: var(--text-light); margin-left: 10px; }
        .edit-date-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 8px 12px; border-radius: 30px; background: var(--bg); }
        .new-status-card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .input-toolbar { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; position: relative; flex-wrap: wrap; }
        .emoji-picker-btn, .attach-btn { background: var(--bg); border: none; font-size: 0.9rem; cursor: pointer; padding: 8px 16px; border-radius: 30px; display: flex; align-items: center; gap: 6px; color: var(--text); }
        .emoji-dropdown { position: absolute; top: 45px; left: 0; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 15px; width: 300px; z-index: 100; border: 1px solid var(--border); display: none; max-height: 350px; overflow-y: auto; }
        .emoji-dropdown.show { display: block; }
        .emoji-category { margin-bottom: 12px; }
        .emoji-category-title { font-size: 0.7rem; color: var(--text-light); margin-bottom: 8px; font-weight: 500; }
        .emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .emoji-item { font-size: 1.3rem; cursor: pointer; padding: 5px; text-align: center; border-radius: 10px; transition: background 0.2s; }
        .emoji-item:hover { background: var(--bg); }
        .new-status-input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 1rem; resize: vertical; outline: none; }
        .new-status-input:focus { border-color: var(--primary); }
        .media-preview { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
        .media-item { position: relative; display: inline-block; background: var(--bg); border-radius: 12px; padding: 8px; }
        .media-item video, .media-item audio { max-width: 200px; border-radius: 12px; }
        .remove-media { position: absolute; top: -8px; right: -8px; background: var(--like); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; }
        .new-status-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 12px; }
        .post-status-btn { padding: 10px 24px; background: var(--primary); color: white; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .status-card { background: var(--card-bg); border-radius: 24px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--border); }
        .status-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .status-time { font-size: 0.8rem; color: var(--text-light); }
        .status-actions { display: flex; gap: 8px; }
        .edit-status-btn, .delete-status-btn { background: none; border: none; font-size: 0.9rem; cursor: pointer; color: var(--text-light); padding: 4px 8px; border-radius: 8px; }
        .status-content { padding: 20px; font-size: 1rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; word-break: break-word; }
        .status-media { padding: 0 20px 20px 20px; }
        .status-media video { max-width: 100%; border-radius: 16px; }
        .status-media audio { width: 100%; }
        .edit-status-textarea { width: 100%; padding: 14px 16px; border: 1.5px solid var(--primary); border-radius: 16px; font-size: 1rem; resize: vertical; outline: none; margin-bottom: 12px; }
        .status-stats { padding: 12px 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; gap: 24px; }
        .stat-btn { background: none; border: none; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-light); cursor: pointer; padding: 6px 0; }
        .stat-btn.liked { color: var(--like); }
        .comments-section { padding: 16px 20px; background: var(--bg); }
        .comment-item { display: flex; gap: 12px; margin-bottom: 14px; font-size: 0.85rem; }
        .comment-name { font-weight: 600; color: var(--text); min-width: 55px; }
        .comment-text { color: var(--text); flex: 1; word-break: break-word; }
        .comment-time { font-size: 0.7rem; color: var(--text-light); }
        .add-comment { display: flex; gap: 12px; margin-top: 14px; }
        .add-comment input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 30px; outline: none; font-size: 0.85rem; }
        .add-comment button { background: none; border: none; color: var(--primary); font-weight: 600; cursor: pointer; }
        .empty-status { text-align: center; padding: 60px 20px; color: var(--text-light); background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); }
        .settings-modal, .date-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(90,80,70,0.5); z-index: 1002; align-items: center; justify-content: center; }
        .settings-card, .date-modal-content { background: var(--card-bg); border-radius: 24px; padding: 30px; width: 90%; max-width: 380px; }
        .settings-card h3, .date-modal-content h4 { margin-bottom: 20px; font-size: 1.3rem; color: var(--primary); }
        .settings-card input, .date-modal-content input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; outline: none; }
        .settings-card button, .date-modal-content button { width: 100%; padding: 12px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--like); color: white; }
        .btn-secondary { background: var(--bg); color: var(--text); }
        .status-msg { text-align: center; padding: 10px; border-radius: 12px; margin: 10px 18px; font-size: 0.8rem; }
        .status-success { background: #D9E0D4; color: #5A6B4A; }
        .status-error { background: #E8D4D4; color: #A55A5A; }
        .status-info { background: #D4E0E8; color: #5A6B7A; }
        .logout-btn { width: calc(100% - 36px); margin: 0 18px 20px; padding: 10px; background: none; border: 1px solid var(--border); border-radius: 30px; color: var(--text-light); cursor: pointer; }
        .file-input { display: none; }
    </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <h2>Agit</h2>
        <p>输入密码进入你的私人空间</p>
        <input type="password" class="login-input" id="loginPassword" placeholder="请输入密码" onkeypress="if(event.key==='Enter') checkLogin()">
        <button class="login-btn" onclick="checkLogin()">进入</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="navbar">
        <div class="logo">Agit</div>
        <div class="nav-buttons">
            <button class="sync-btn" onclick="syncWithGitHub()" title="同步到云端">☁️</button>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
    </div>

    <div class="date-section">
        <div>
            <span class="date-info" id="displayDate"></span>
            <span class="date-weekday" id="displayWeekday"></span>
        </div>
        <button class="edit-date-btn" onclick="openDateModal()">📅</button>
    </div>

    <div class="new-status-card">
        <div class="input-toolbar">
            <button class="emoji-picker-btn" onclick="toggleEmojiPicker()">😊 表情</button>
            <button class="attach-btn" onclick="document.getElementById('videoInput').click()">📹 视频</button>
            <button class="attach-btn" onclick="document.getElementById('audioInput').click()">🎵 音频</button>
            <div class="emoji-dropdown" id="emojiDropdown">
                <div class="emoji-category">
                    <div class="emoji-category-title">😊 积极</div>
                    <div class="emoji-grid">
                        <div class="emoji-item" onclick="addEmoji('😊')">😊</div><div class="emoji-item" onclick="addEmoji('❤️')">❤️</div>
                        <div class="emoji-item" onclick="addEmoji('👍')">👍</div><div class="emoji-item" onclick="addEmoji('🎉')">🎉</div>
                        <div class="emoji-item" onclick="addEmoji('✨')">✨</div><div class="emoji-item" onclick="addEmoji('🌟')">🌟</div>
                        <div class="emoji-item" onclick="addEmoji('💪')">💪</div><div class="emoji-item" onclick="addEmoji('🌸')">🌸</div>
                        <div class="emoji-item" onclick="addEmoji('🌈')">🌈</div><div class="emoji-item" onclick="addEmoji('⭐')">⭐</div>
                        <div class="emoji-item" onclick="addEmoji('🔥')">🔥</div><div class="emoji-item" onclick="addEmoji('💎')">💎</div>
                    </div>
                </div>
                <div class="emoji-category">
                    <div class="emoji-category-title">😢 负面</div>
                    <div class="emoji-grid">
                        <div class="emoji-item" onclick="addEmoji('😢')">😢</div><div class="emoji-item" onclick="addEmoji('😭')">😭</div>
                        <div class="emoji-item" onclick="addEmoji('😠')">😠</div><div class="emoji-item" onclick="addEmoji('💀')">💀</div>
                        <div class="emoji-item" onclick="addEmoji('👻')">👻</div><div class="emoji-item" onclick="addEmoji('😈')">😈</div>
                        <div class="emoji-item" onclick="addEmoji('👿')">👿</div><div class="emoji-item" onclick="addEmoji('🤡')">🤡</div>
                        <div class="emoji-item" onclick="addEmoji('😤')">😤</div><div class="emoji-item" onclick="addEmoji('😩')">😩</div>
                        <div class="emoji-item" onclick="addEmoji('😫')">😫</div><div class="emoji-item" onclick="addEmoji('💔')">💔</div>
                    </div>
                </div>
                <div class="emoji-category">
                    <div class="emoji-category-title">🌧️ 天气</div>
                    <div class="emoji-grid">
                        <div class="emoji-item" onclick="addEmoji('☀️')">☀️</div><div class="emoji-item" onclick="addEmoji('☁️')">☁️</div>
                        <div class="emoji-item" onclick="addEmoji('🌧️')">🌧️</div><div class="emoji-item" onclick="addEmoji('⛈️')">⛈️</div>
                        <div class="emoji-item" onclick="addEmoji('🌪️')">🌪️</div><div class="emoji-item" onclick="addEmoji('❄️')">❄️</div>
                        <div class="emoji-item" onclick="addEmoji('☔')">☔</div><div class="emoji-item" onclick="addEmoji('⚡')">⚡</div>
                        <div class="emoji-item" onclick="addEmoji('💨')">💨</div><div class="emoji-item" onclick="addEmoji('🌙')">🌙</div>
                        <div class="emoji-item" onclick="addEmoji('🌞')">🌞</div><div class="emoji-item" onclick="addEmoji('🐱')">🐱</div>
                    </div>
                </div>
            </div>
        </div>
        <textarea class="new-status-input" id="newStatusInput" rows="3" placeholder="写点什么..."></textarea>
        <div class="media-preview" id="mediaPreview"></div>
        <div class="new-status-actions">
            <button class="post-status-btn" onclick="addStatus()">发布</button>
        </div>
    </div>

    <div id="statusList"></div>
    <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
    <div id="statusMsg" style="display: none;"></div>
</div>

<input type="file" id="videoInput" accept="video/*" style="display:none" onchange="handleMediaSelect(this, 'video')">
<input type="file" id="audioInput" accept="audio/*" style="display:none" onchange="handleMediaSelect(this, 'audio')">

<div class="date-modal" id="dateModal">
    <div class="date-modal-content">
        <h4>选择日期</h4>
        <input type="date" id="datePicker">
        <button class="btn-primary" onclick="changeDate()">切换</button>
        <button class="btn-secondary" onclick="closeDateModal()">取消</button>
    </div>
</div>

<div class="settings-modal" id="settingsModal">
    <div class="settings-card">
        <h3>⚙️ 密码设置</h3>
        <input type="password" id="newPassword" placeholder="新密码">
        <input type="password" id="confirmPassword" placeholder="确认密码">
        <button class="btn-primary" onclick="changePassword()">修改密码</button>
        <button class="btn-danger" onclick="disablePassword()">取消密码</button>
        <button class="btn-secondary" onclick="closeSettings()">关闭</button>
    </div>
</div>

<script>
    // ========== GitHub 配置 - 请在这里填写你的信息 ==========
    const GITHUB_USERNAME = "hz0451";  // 替换成你的GitHub用户名
    const GITHUB_REPO = "hz.github.io";  // 替换成你的仓库名
    const GITHUB_TOKEN = "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";  // 替换成你生成的Token
    const DATA_FILE = "agit_data.json";
    // =====================================================

    const STORAGE_KEY = 'agit_diary_data';
    const PASSWORD_KEY = 'agit_password';
    const DEFAULT_PASSWORD = '123456';

    let currentDate = new Date().toISOString().split('T')[0];
    let allData = {};
    let isSyncing = false;
    let editingStatusId = null;
    let pendingMedia = { type: null, file: null, previewUrl: null };

    // GitHub API 请求
    async function githubRequest(method, endpoint, body = null) {
        const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${endpoint}`;
        const headers = {
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
        };
        if (body) {
            headers['Content-Type'] = 'application/json';
        }
        const options = { method: method, headers: headers };
        if (body) {
            options.body = JSON.stringify(body);
        }
        const response = await fetch(url, options);
        return response;
    }

    // 上传数据到 GitHub
    async function uploadToGitHub() {
        if (!GITHUB_TOKEN || GITHUB_TOKEN === "你的Token") {
            showStatus('请先在代码中配置 GitHub Token', 'error');
            return false;
        }
        try {
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(allData, null, 2))));
            // 先获取当前文件信息（用于获取 sha）
            let sha = null;
            const getRes = await githubRequest('GET', DATA_FILE);
            if (getRes.status === 200) {
                const fileData = await getRes.json();
                sha = fileData.sha;
            }
            const body = {
                message: `更新日记数据 - ${new Date().toLocaleString()}`,
                content: content,
                branch: 'main'
            };
            if (sha) body.sha = sha;
            const response = await githubRequest('PUT', DATA_FILE, body);
            if (response.status === 201 || response.status === 200) {
                showStatus('☁️ 已同步到 GitHub', 'success');
                return true;
            } else {
                const err = await response.json();
                throw new Error(err.message);
            }
        } catch(e) {
            showStatus('同步失败: ' + e.message, 'error');
            return false;
        }
    }

    // 从 GitHub 下载数据
    async function downloadFromGitHub() {
        if (!GITHUB_TOKEN || GITHUB_TOKEN === "你的Token") {
            showStatus('请先在代码中配置 GitHub Token', 'error');
            return false;
        }
        try {
            const response = await githubRequest('GET', DATA_FILE);
            if (response.status === 200) {
                const fileData = await response.json();
                const content = decodeURIComponent(escape(atob(fileData.content)));
                allData = JSON.parse(content);
                saveAllData();
                showStatus('☁️ 从 GitHub 同步成功', 'success');
                return true;
            } else if (response.status === 404) {
                showStatus('云端暂无数据，保存后会自动上传', 'info');
                return false;
            } else {
                throw new Error('获取失败');
            }
        } catch(e) {
            showStatus('同步失败: ' + e.message, 'error');
            return false;
        }
    }

    async function syncWithGitHub() {
        if (isSyncing) return;
        isSyncing = true;
        showStatus('🔄 同步中...', 'info');
        await downloadFromGitHub();
        renderStatusList();
        isSyncing = false;
    }

    // 媒体上传到 GitHub（转 base64 存储）
    async function uploadMediaToGitHub(file, type) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const base64Data = e.target.result.split(',')[1];
                    const fileName = `media/${Date.now()}_${file.name}`;
                    const content = base64Data;
                    const body = {
                        message: `上传媒体文件 - ${new Date().toLocaleString()}`,
                        content: content,
                        branch: 'main'
                    };
                    const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${fileName}`;
                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });
                    if (response.status === 201 || response.status === 200) {
                        const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${fileName}`;
                        resolve(rawUrl);
                    } else {
                        reject(new Error('上传失败'));
                    }
                } catch(err) {
                    reject(err);
                }
            };
            reader.onerror = () => reject(new Error('读取文件失败'));
            reader.readAsDataURL(file);
        });
    }

    function toggleEmojiPicker() {
        const dropdown = document.getElementById('emojiDropdown');
        dropdown.classList.toggle('show');
        const closePicker = (e) => {
            if (!dropdown.contains(e.target) && !e.target.classList.contains('emoji-picker-btn')) {
                dropdown.classList.remove('show');
                document.removeEventListener('click', closePicker);
            }
        };
        setTimeout(() => document.addEventListener('click', closePicker), 100);
    }

    function addEmoji(emoji) {
        const input = document.getElementById('newStatusInput');
        input.value += emoji;
        input.focus();
    }

    function handleMediaSelect(input, type) {
        const file = input.files[0];
        if (!file) return;
        const previewUrl = URL.createObjectURL(file);
        pendingMedia = { type: type, file: file, previewUrl: previewUrl };
        const preview = document.getElementById('mediaPreview');
        if (type === 'video') {
            preview.innerHTML = `<div class="media-item"><video src="${previewUrl}" controls style="max-width:200px; border-radius:12px;"></video><button class="remove-media" onclick="clearPendingMedia()">×</button></div>`;
        } else {
            preview.innerHTML = `<div class="media-item"><audio src="${previewUrl}" controls></audio><button class="remove-media" onclick="clearPendingMedia()">×</button></div>`;
        }
    }

    function clearPendingMedia() {
        if (pendingMedia.previewUrl) URL.revokeObjectURL(pendingMedia.previewUrl);
        pendingMedia = { type: null, file: null, previewUrl: null };
        document.getElementById('mediaPreview').innerHTML = '';
        document.getElementById('videoInput').value = '';
        document.getElementById('audioInput').value = '';
    }

    function loadAllData() { const stored = localStorage.getItem(STORAGE_KEY); allData = stored ? JSON.parse(stored) : {}; }
    function saveAllData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); setTimeout(() => uploadToGitHub(), 500); }
    function getDayData() { if (!allData[currentDate]) allData[currentDate] = { statuses: [] }; return allData[currentDate]; }
    function saveDayData(data) { allData[currentDate] = data; saveAllData(); }

    async function addStatus() {
        const content = document.getElementById('newStatusInput').value.trim();
        let mediaUrl = null;
        if (pendingMedia.file) {
            showStatus('上传媒体中...', 'info');
            try {
                mediaUrl = await uploadMediaToGitHub(pendingMedia.file, pendingMedia.type);
            } catch(e) {
                showStatus('媒体上传失败: ' + e.message, 'error');
                return;
            }
        }
        const dayData = getDayData();
        dayData.statuses.unshift({ id: Date.now(), content: content || '', time: new Date().toLocaleString(), likes: 0, liked: false, comments: [], media: mediaUrl ? { type: pendingMedia.type, url: mediaUrl } : null });
        saveDayData(dayData);
        document.getElementById('newStatusInput').value = '';
        clearPendingMedia();
        renderStatusList();
        showStatus('✅ 已发布并同步', 'success');
    }

    function startEditStatus(id) { editingStatusId = id; renderStatusList(); }
    function saveEditStatus(id) {
        const newContent = document.getElementById(`edit_textarea_${id}`).value.trim();
        const dayData = getDayData();
        const status = dayData.statuses.find(s => s.id === id);
        if (status && newContent) status.content = newContent;
        saveDayData(dayData);
        editingStatusId = null;
        renderStatusList();
        showStatus('✏️ 已更新', 'success');
    }
    function cancelEdit() { editingStatusId = null; renderStatusList(); }
    function deleteStatus(id) { if (!confirm('确定删除？')) return; const dayData = getDayData(); dayData.statuses = dayData.statuses.filter(s => s.id !== id); saveDayData(dayData); renderStatusList(); showStatus('🗑️ 已删除', 'success'); }
    function toggleLike(id) { const dayData = getDayData(); const s = dayData.statuses.find(s => s.id === id); if(s){ if(s.liked){ s.likes--; s.liked=false; }else{ s.likes++; s.liked=true; } saveDayData(dayData); renderStatusList(); } }
    function addComment(id) { const input = document.getElementById(`comment_input_${id}`); const text = input.value.trim(); if(!text) return; const dayData = getDayData(); const s = dayData.statuses.find(s => s.id === id); if(s){ s.comments.push({ text: text, time: new Date().toLocaleString() }); saveDayData(dayData); input.value = ''; renderStatusList(); showStatus('💬 评论已发布', 'success'); } }
    function deleteComment(statusId, idx) { const dayData = getDayData(); const s = dayData.statuses.find(s => s.id === statusId); if(s){ s.comments.splice(idx,1); saveDayData(dayData); renderStatusList(); } }

    function renderStatusList() {
        const statuses = getDayData().statuses || [];
        const container = document.getElementById('statusList');
        if (statuses.length === 0) { container.innerHTML = '<div class="empty-status">✨ 还没有状态，写点什么吧～</div>'; return; }
        container.innerHTML = statuses.map(s => editingStatusId === s.id ? `
            <div class="status-card"><div class="status-header"><span class="status-time">📝 ${s.time}</span><div class="status-actions"><button class="edit-status-btn" onclick="saveEditStatus(${s.id})">💾 保存</button><button class="edit-status-btn" onclick="cancelEdit()">❌ 取消</button></div></div><div class="status-content"><textarea class="edit-status-textarea" id="edit_textarea_${s.id}" rows="4">${escapeHtml(s.content)}</textarea></div></div>
        ` : `
            <div class="status-card"><div class="status-header"><span class="status-time">📝 ${s.time}</span><div class="status-actions"><button class="edit-status-btn" onclick="startEditStatus(${s.id})">✏️ 编辑</button><button class="delete-status-btn" onclick="deleteStatus(${s.id})">🗑️</button></div></div><div class="status-content">${escapeHtml(s.content)}</div>${s.media ? `<div class="status-media">${s.media.type === 'video' ? `<video src="${s.media.url}" controls style="max-width:100%; border-radius:16px;"></video>` : `<audio src="${s.media.url}" controls style="width:100%;"></audio>`}</div>` : ''}<div class="status-stats"><button class="stat-btn ${s.liked ? 'liked' : ''}" onclick="toggleLike(${s.id})"><span>❤️</span> <span>${s.likes || 0}</span></button><button class="stat-btn" onclick="document.getElementById('comments_${s.id}').scrollIntoView({behavior:'smooth'})"><span>💬</span> <span>${s.comments.length}</span></button></div><div class="comments-section" id="comments_${s.id}">${renderComments(s.comments, s.id)}<div class="add-comment"><input type="text" id="comment_input_${s.id}" placeholder="写评论..." onkeypress="if(event.key==='Enter') addComment(${s.id})"><button onclick="addComment(${s.id})">发送</button></div></div></div>
        `).join('');
    }

    function renderComments(comments, statusId) {
        if (!comments || comments.length === 0) return '<div style="color:var(--text-light); font-size:0.75rem; margin-bottom:10px;">还没有评论</div>';
        return comments.map((c, idx) => `<div class="comment-item"><span class="comment-name">📝 你</span><div style="flex:1"><div class="comment-text">${escapeHtml(c.text)}</div><div class="comment-time">${c.time}</div></div><button onclick="deleteComment(${statusId}, ${idx})" style="background:none; border:none; color:var(--text-light); cursor:pointer;">🗑️</button></div>`).join('');
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function updateDateDisplay() { const d = new Date(currentDate); document.getElementById('displayDate').innerText = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; document.getElementById('displayWeekday').innerText = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][d.getDay()]; }
    function changeDate() { const nd = document.getElementById('datePicker').value; if(nd){ currentDate = nd; updateDateDisplay(); renderStatusList(); } closeDateModal(); }
    function openDateModal() { document.getElementById('datePicker').value = currentDate; document.getElementById('dateModal').style.display = 'flex'; }
    function closeDateModal() { document.getElementById('dateModal').style.display = 'none'; }
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function showStatus(msg, type) { const div = document.getElementById('statusMsg'); div.textContent = msg; div.className = `status-msg status-${type}`; div.style.display = 'block'; setTimeout(() => div.style.display = 'none', 2500); }
    function getStoredPassword() { const p = localStorage.getItem(PASSWORD_KEY); return p === null ? DEFAULT_PASSWORD : p; }
    function checkLogin() { const input = document.getElementById('loginPassword').value; const stored = getStoredPassword(); if(stored === '' || input === stored){ document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; loadAllData(); updateDateDisplay(); renderStatusList(); setTimeout(() => { if(GITHUB_TOKEN && GITHUB_TOKEN !== "你的Token") syncWithGitHub(); }, 500); } else { document.getElementById('loginError').innerText = '密码错误'; } }
    function logout() { editingStatusId = null; document.getElementById('mainContent').style.display = 'none'; document.getElementById('loginOverlay').style.display = 'flex'; document.getElementById('loginPassword').value = ''; document.getElementById('loginError').innerText = ''; }
    function changePassword() { const np = document.getElementById('newPassword').value; const cp = document.getElementById('confirmPassword').value; if(!np || np !== cp || np.length < 4){ showStatus('密码至少4位且一致', 'error'); return; } localStorage.setItem(PASSWORD_KEY, np); closeSettings(); showStatus('密码修改成功', 'success'); setTimeout(() => { if(confirm('是否退出用新密码登录？')) logout(); }, 1000); }
    function disablePassword() { if(confirm('确定取消密码？')){ localStorage.setItem(PASSWORD_KEY, ''); closeSettings(); showStatus('密码已取消', 'success'); setTimeout(() => logout(), 1000); } }
    function checkAutoLogin() { if(getStoredPassword() === ''){ document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainContent').style.display = 'block'; loadAllData(); updateDateDisplay(); renderStatusList(); setTimeout(() => { if(GITHUB_TOKEN && GITHUB_TOKEN !== "你的Token") syncWithGitHub(); }, 500); } }
    document.getElementById('dateModal').addEventListener('click', e => { if(e.target === document.getElementById('dateModal')) closeDateModal(); });
    document.getElementById('settingsModal').addEventListener('click', e => { if(e.target === document.getElementById('settingsModal')) closeSettings(); });
    checkAutoLogin();
</script>
</body>
</html>
